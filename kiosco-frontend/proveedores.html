<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proveedores</title>
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        .table-responsive { max-height: 70vh; overflow-y: auto; }
        .sticky-top { top: -1px; z-index: 1020; }
        .offcanvas { width: 300px !important; }
        .nav-link { color: #333; font-weight: 500; padding: 15px 20px; border-bottom: 1px solid #f0f0f0; }
        .nav-link:hover { background-color: #f8f9fa; }
        .btn-acciones {
            background-color: white;
            border: none;
            padding: 6px 10px;
        }

        .btn-acciones:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Eli Mini Market</span>
        <div class="d-flex align-items-center">
            <span class="text-white me-3 d-none d-md-inline" id="nombre-vendedor">Cargando...</span>
            <button class="navbar-toggler border-0" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </div>
</nav>

<div class="offcanvas offcanvas-end" id="menuLateral">
    <div class="offcanvas-header bg-dark text-white">
        <h5 class="offcanvas-title">Panel de Control</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body p-0">
        <nav class="nav flex-column">
            <a class="nav-link" href="index.html">Punto de Venta</a>
            <a class="nav-link" href="caja.html">Gestión de Caja</a>

            <div>
                <a class="nav-link d-flex justify-content-between align-items-center bg-light"
                    data-bs-toggle="collapse" href="#menuStock">
                    Inventario <small>▲</small>
                </a>

                 <div class="collapse show bg-light" id="menuStock">
                    <a class="nav-link ps-4 py-2 small" href="productos.html">
                        Lista de Productos
                    </a>

                    <a class="nav-link ps-4 py-2 small fw-bold text-primary" href="proveedores.html">
                        Proveedores
                    </a>
                </div>
            </div>

            <a class="nav-link d-flex justify-content-between align-items-center" data-bs-toggle="collapse" href="#menuReportes">
                    Reportes <small>▼</small>
            </a>
                <div class="collapse bg-light" id="menuReportes">
                    <a class="nav-link ps-4 py-2 small" href="ventas-dia.html">Ventas</a>
                    <a class="nav-link ps-4 py-2 small" href="top-productos.html">
                        Top Productos
                    </a>
                    <a class="nav-link ps-4 py-2 small" href="historial-ventas.html">
                        Historial de Ventas
                    </a>
                </div>
        </nav>

        <div class="mt-auto p-3 border-top">
            <button class="btn btn-danger w-100" id="btn-logout">Cerrar Sesión</button>
        </div>
    </div>
</div>

<div class="container-fluid px-4">

    <div class="card shadow-sm">
        
        <!-- HEADER -->
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center border-bottom-0">
            <h4 class="mb-0 fw-bold text-dark">Gestión de Proveedores</h4>

            <button class="btn btn-primary fw-bold" data-bs-toggle="modal" data-bs-target="#modalProveedor">
                + Nuevo Proveedor
            </button>
        </div>

        <div class="card-body">

            <div class="row g-3 mb-4">
                <div class="col-md-12">
                    <input type="text" id="buscar-proveedor" class="form-control form-control-lg"
                        placeholder="Buscar por nombre o teléfono">
                </div>
            </div>

            <div class="table-responsive border rounded">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light sticky-top">
                        <tr>
                            <th>Proveedor</th>
                            <th>Teléfono</th>
                            <th>Email</th>
                            <th>Dirección</th>
                            <th width="120" class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-proveedores"></tbody>
                </table>
            </div>

        </div>
    </div>

</div>

<div class="modal fade" id="modalProveedor" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title">Proveedor</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <form id="form-proveedor">
                <div class="modal-body">

                    <input type="hidden" id="id_proveedor">

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Nombre</label>
                        <input type="text" id="nombre" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Teléfono</label>
                        <input type="text" id="telefono" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Email</label>
                        <input type="email" id="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Dirección</label>
                        <input type="text" id="direccion" class="form-control">
                    </div>

                </div>

                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar</button>
                </div>
            </form>

        </div>
    </div>
</div>

<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="toastCaja" class="toast align-items-center text-bg-success border-0">
        <div class="d-flex">
            <div class="toast-body" id="toastMensaje"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script src="/js/bootstrap.bundle.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/proveedores.js"></script>

</body>
</html>
